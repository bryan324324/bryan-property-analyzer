<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryan's Property Analyzer</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#02060c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Property Analyzer">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="install-banner" class="install-banner hidden">
  <span>Install this app for offline access</span>
  <button id="install-btn" onclick="installApp()">Install</button>
  <button class="dismiss-btn" onclick="dismissInstall()">✕</button>
</div>

<div class="wrapper">

  <div class="header">
    <div class="header-left">
      <img src="logo.png" class="logo" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="header-center">
      <div class="brand">Bryan's Property Analyzer</div>
    </div>
    <div class="header-right">
      <div class="status">
        <span class="dot"></span> LIVE
      </div>
    </div>
  </div>

  <div class="main">

    <div class="panel left">
      <div class="label">INPUT</div>

      <label class="field-label">Property Address</label>
      <input id="address" placeholder="123 Main St, Miami, FL 33101" autocomplete="street-address">

      <label class="field-label">Property Type</label>
      <select id="type">
        <option>Residential (1-4 units)</option>
        <option>Multifamily 5+</option>
        <option>Commercial</option>
        <option>Land</option>
      </select>

      <label class="field-label">Report Mode</label>
      <select id="mode">
        <option>Full Report</option>
        <option>Comps Only</option>
        <option>Investment Analysis</option>
        <option>Flip Analysis</option>
        <option>Rental Analysis</option>
      </select>

      <label class="field-label">Purchase Price ($)</label>
      <input id="purchase_price" type="number" placeholder="e.g. 350000">

      <label class="field-label">Down Payment (%)</label>
      <input id="down_payment" type="number" placeholder="e.g. 20" min="0" max="100">

      <label class="field-label">Optional Notes / Context</label>
      <input id="notes" placeholder="e.g. Owner motivated, needs roof, corner lot">

      <div class="buttons">
        <button id="run-btn" onclick="run()">
          <span id="btn-text">RUN ANALYSIS</span>
          <span id="btn-loader" class="hidden">...</span>
        </button>
        <button onclick="copyOutput()" title="Copy output">COPY</button>
        <button onclick="clearAll()" title="Clear all fields">CLEAR</button>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
    </div>

    <div class="panel right">
      <div class="label-row">
        <div class="label">OUTPUT</div>
        <div id="output-meta" class="output-meta"></div>
      </div>
      <pre id="output">Ready — fill out the form and hit RUN ANALYSIS.</pre>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
